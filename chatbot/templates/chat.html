<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redmine_RAG 챗봇 - MTS BIO-DT Team</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 90%;
            max-width: 1000px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message.bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }
        
        .sources {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
        }
        
        .sources a {
            display: inline-block;
            margin: 5px 10px 5px 0;
            padding: 5px 10px;
            background: #f0f0f0;
            border-radius: 5px;
            color: #667eea;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .sources a:hover {
            background: #667eea;
            color: white;
        }
        
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        #question-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #question-input:focus {
            border-color: #667eea;
        }
        
        #send-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #send-btn:hover {
            transform: scale(1.05);
        }
        
        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .timestamp {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Redmine RAG 챗봇</h1>
            <p>MTS BIO-DT 실험 데이터 검색 시스템</p>
        </div>
        
        <div class="chat-container" id="chat-box">
            <div class="message bot">
                <div class="message-content">
                    안녕하세요! Redmine 실험 데이터 검색 챗봇입니다. <br><br>
                    <strong>질문 예시:</strong><br>
                    • 최신 TSR 모델의 Dice Score는?<br>
                    • BRAF 모델 v0.2.1의 성능은?<br>
                    • 갑상선 관련 최신 실험 결과는?<br>
                    • F1-score가 0.8 이상인 모델은?
                </div>
            </div>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="question-input" 
                placeholder="질문을 입력하세요..."
                autocomplete="off"
            >
            <button id="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>
    
    <script>
        const chatBox = document.getElementById('chat-box');
        const questionInput = document.getElementById('question-input');
        const sendBtn = document.getElementById('send-btn');

        // 마크다운 표를 HTML로 변환
        function convertMarkdownTable(text) {
            // 표 형식 감지 (|로 시작하는 줄들)
            const lines = text.split('\n');
            let html = text;
            let inTable = false;
            let tableHtml = '<table border="1" style="border-collapse: collapse; margin: 10px 0;">';
            let tableLines = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('|') && line.endsWith('|')) {
                    if (!inTable) {
                        inTable = true;
                        tableLines = [];
                    }
                    tableLines.push(line);
                } else if (inTable) {
                    // 표 끝
                    if (tableLines.length > 0) {
                        tableHtml = '<table border="1" style="border-collapse: collapse; margin: 10px 0; width: 100%;">';

                        tableLines.forEach((tableLine, idx) => {
                            // 구분선(---) 건너뛰기
                            if (tableLine.includes('---')) return;

                            const cells = tableLine.split('|').filter(cell => cell.trim() !== '');
                            const tag = idx === 0 ? 'th' : 'td';
                            const style = idx === 0 ?
                                'style="background: #f0f0f0; padding: 8px; text-align: left;"' :
                                'style="padding: 8px;"';

                            tableHtml += '<tr>';
                            cells.forEach(cell => {
                                tableHtml += `<${tag} ${style}>${cell.trim()}</${tag}>`;
                            });
                            tableHtml += '</tr>';
                        });

                        tableHtml += '</table>';

                        // 원본 텍스트에서 표 부분을 HTML로 교체
                        const tableText = tableLines.join('\n');
                        html = html.replace(tableText, tableHtml);
                    }
                    inTable = false;
                    tableLines = [];
                }
            }

            // 마지막 표 처리
            if (inTable && tableLines.length > 0) {
                tableHtml = '<table border="1" style="border-collapse: collapse; margin: 10px 0; width: 100%;">';

                tableLines.forEach((tableLine, idx) => {
                    if (tableLine.includes('---')) return;

                    const cells = tableLine.split('|').filter(cell => cell.trim() !== '');
                    const tag = idx === 0 ? 'th' : 'td';
                    const style = idx === 0 ?
                        'style="background: #f0f0f0; padding: 8px; text-align: left;"' :
                        'style="padding: 8px;"';

                    tableHtml += '<tr>';
                    cells.forEach(cell => {
                        tableHtml += `<${tag} ${style}>${cell.trim()}</${tag}>`;
                    });
                    tableHtml += '</tr>';
                });

                tableHtml += '</table>';
                const tableText = tableLines.join('\n');
                html = html.replace(tableText, tableHtml);
            }

            // 줄바꿈을 <br>로 변환
            return html.replace(/\n/g, '<br>');
        }

        // 메시지 추가 함수
        function addMessage(role, content, sources = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            // 마크다운 표 변환
            const formattedContent = convertMarkdownTable(content);

            let html = `<div class="message-content">${formattedContent}`;

            if (sources && sources.length > 0) {
                html += '<div class="sources"><strong>📚 참고 이슈:</strong><br>';
                sources.forEach(source => {
                    html += `<a href="${source.url}" target="_blank">Issue #${source.issue_id}</a>`;
                });
                html += '</div>';
            }

            const now = new Date().toLocaleTimeString('ko-KR');
            html += `<div class="timestamp">${now}</div>`;
            html += '</div>';

            messageDiv.innerHTML = html;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        // 질문 전송
        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question) return;
            
            // 사용자 메시지 표시
            addMessage('user', question);
            questionInput.value = '';
            
            // 버튼 비활성화
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';
            
            try {
                // API 호출
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question
                        // top_k는 서버에서 자동 설정
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 답변 표시
                    addMessage('bot', data.answer, data.sources);
                } else {
                    addMessage('bot', `❌ 오류: ${data.error}`);
                }
                
            } catch (error) {
                addMessage('bot', `❌ 네트워크 오류: ${error.message}`);
            } finally {
                // 버튼 활성화
                sendBtn.disabled = false;
                sendBtn.innerHTML = '전송';
            }
        }
        
        // Enter 키 이벤트
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // 페이지 로드 시 입력창 포커스
        window.onload = () => {
            questionInput.focus();
        };
    </script>
</body>
</html>
