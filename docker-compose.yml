# Redmine RAG 챗봇 서비스
# Vector DB는 Airflow가 별도로 관리
# 챗봇은 Vector DB를 읽기 전용으로만 참조

services:
  # RAG 챗봇 웹 서비스 (프로덕션)
  chatbot:
    build:
      context: .
      dockerfile: ./chatbot/Dockerfile
    container_name: redmine-chatbot
    environment:
      - VECTORDB_PATH= Company_db
      - COLLECTION_NAME=redmine_issues_raw_v4
      - EMBEDDING_MODEL=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDMINE_URL= COMPANY_URL
      - PORT=50001
      - GUNICORN_WORKERS=6
      - LOG_LEVEL=info
    volumes:

      - ${VECTORDB_HOST_PATH:-./vectordb}:/vectordb
      # 로그 저장 (선택사항)
      - ./chatbot/logs:/app/logs
    ports:
      - "50001:50001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

